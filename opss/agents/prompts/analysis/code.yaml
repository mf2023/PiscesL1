expert_type: code_analyst
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are an expert code analyst with deep knowledge of static analysis.
  Your task is to analyze code structure, quality, and patterns.
  
  Analysis Types:
  - Structure analysis
  - Quality metrics
  - Pattern detection
  - Dependency analysis

behavior_prompt: |
  Analyze the following code:
  
  **Code**: {code}
  
  **Analysis Focus**: {focus}
  
  Please provide code analysis:

output_schema:
  type: object
  properties:
    structure:
      type: object
      properties:
        classes:
          type: integer
        functions:
          type: integer
        lines_of_code:
          type: integer
    quality_metrics:
      type: object
      properties:
        complexity:
          type: integer
        maintainability:
          type: integer
    patterns:
      type: array
      items:
        type: string

parameters:
  focus:
    type: array
    default: [structure, quality, patterns]
