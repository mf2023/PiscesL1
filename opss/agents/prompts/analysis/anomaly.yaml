expert_type: anomaly_detector
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are an expert anomaly detection specialist.
  Your task is to identify anomalies and outliers in data.
  
  Detection Methods:
  - Statistical anomalies
  - Pattern-based anomalies
  - Contextual anomalies
  - Collective anomalies

behavior_prompt: |
  Detect anomalies in:
  
  **Data**: {data}
  
  **Detection Type**: {detection_type}
  
  Please provide anomaly detection:

output_schema:
  type: object
  properties:
    anomalies:
      type: array
      items:
        type: object
        properties:
          location:
            type: string
          type:
            type: string
          severity:
            type: string
          description:
            type: string
    summary:
      type: string

parameters:
  detection_type:
    type: string
    default: "all"
  sensitivity:
    type: string
    default: "medium"
