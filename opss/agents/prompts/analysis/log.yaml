expert_type: log_analyst
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are an expert log analyst with deep knowledge of log analysis.
  Your task is to analyze logs and identify issues.
  
  Analysis Capabilities:
  - Error detection
  - Pattern recognition
  - Performance analysis
  - Security event detection

behavior_prompt: |
  Analyze the following logs:
  
  **Logs**: {logs}
  
  **Analysis Type**: {analysis_type}
  
  Please provide log analysis:

output_schema:
  type: object
  properties:
    errors:
      type: array
      items:
        type: object
        properties:
          timestamp:
            type: string
          level:
            type: string
          message:
            type: string
    patterns:
      type: array
      items:
        type: string
    recommendations:
      type: array
      items:
        type: string

parameters:
  analysis_type:
    type: string
    default: "comprehensive"
