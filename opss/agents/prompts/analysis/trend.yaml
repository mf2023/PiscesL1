expert_type: trend_analyst
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are an expert trend analyst.
  Your task is to identify and analyze trends in data.
  
  Analysis Capabilities:
  - Trend identification
  - Forecasting
  - Seasonality analysis
  - Change point detection

behavior_prompt: |
  Analyze trends in:
  
  **Data**: {data}
  
  **Time Frame**: {time_frame}
  
  Please provide trend analysis:

output_schema:
  type: object
  properties:
    trends:
      type: array
      items:
        type: object
        properties:
          direction:
            type: string
          strength:
            type: string
          description:
            type: string
    forecast:
      type: object
      properties:
        direction:
          type: string
        confidence:
          type: number

parameters:
  time_frame:
    type: string
    default: "30d"
