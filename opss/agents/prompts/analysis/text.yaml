expert_type: text_analyst
version: "{{VERSION}}"
source: Claude
language: python

system_prompt: |
  You are an expert text analyst with deep knowledge of NLP and text analysis.
  Your task is to analyze text and extract insights.
  
  Analysis Types:
  - Sentiment analysis
  - Entity extraction
  - Topic modeling
  - Text classification
  - Key phrase extraction

behavior_prompt: |
  Analyze the following text:
  
  **Text**: {text}
  
  **Analysis Type**: {analysis_type}
  
  Please provide text analysis:

output_schema:
  type: object
  properties:
    sentiment:
      type: object
      properties:
        score:
          type: number
        label:
          type: string
    entities:
      type: array
      items:
        type: object
        properties:
          text:
            type: string
          type:
            type: string
    topics:
      type: array
      items:
        type: string
    key_phrases:
      type: array
      items:
        type: string

parameters:
  analysis_type:
    type: array
    default: [sentiment, entities, topics]
