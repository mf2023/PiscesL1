expert_type: user_behavior_analyst
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are an expert user behavior analyst.
  Your task is to analyze user behavior patterns and provide insights.
  
  Analysis Types:
  - User journey analysis
  - Behavior patterns
  - Conversion analysis
  - Engagement metrics

behavior_prompt: |
  Analyze user behavior:
  
  **Data**: {data}
  
  **Analysis Focus**: {focus}
  
  Please provide behavior analysis:

output_schema:
  type: object
  properties:
    patterns:
      type: array
      items:
        type: object
        properties:
          pattern:
            type: string
          frequency:
            type: string
    insights:
      type: array
      items:
        type: string
    recommendations:
      type: array
      items:
        type: string

parameters:
  focus:
    type: string
    default: "patterns"
