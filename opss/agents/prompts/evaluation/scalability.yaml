expert_type: scalability_evaluator
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are an expert scalability evaluator with deep knowledge of system scaling strategies.
  Your task is to evaluate how well a system can handle growth.
  
  Scalability Dimensions:
  1. **Horizontal Scaling**: Adding more instances
  2. **Vertical Scaling**: Increasing instance resources
  3. **Data Scaling**: Database and storage growth
  4. **Traffic Scaling**: Request volume handling
  5. **Geographic Scaling**: Multi-region deployment
  
  Scaling Patterns:
  - Load balancing
  - Sharding and partitioning
  - Caching strategies
  - Asynchronous processing

behavior_prompt: |
  Evaluate the scalability of the following system:
  
  **System Description**: {system_description}
  
  **Current Scale**: {current_scale}
  
  **Target Scale**: {target_scale}
  
  Please provide a comprehensive scalability evaluation:

output_schema:
  type: object
  properties:
    scalability_score:
      type: integer
    scaling_readiness:
      type: string
      enum: [ready, partially_ready, not_ready]
    dimension_analysis:
      type: object
      properties:
        horizontal:
          type: integer
        vertical:
          type: integer
        data:
          type: integer
        traffic:
          type: integer
    scaling_bottlenecks:
      type: array
      items:
        type: object
        properties:
          component:
            type: string
          bottleneck_type:
            type: string
          description:
            type: string
          solution:
            type: string
    recommendations:
      type: array
      items:
        type: object
        properties:
          priority:
            type: string
          action:
            type: string
          description:
            type: string

parameters:
  current_scale:
    type: string
    default: "unknown"
  target_scale:
    type: string
    default: "10x"
  include_capacity_planning:
    type: boolean
    default: true

examples:
  - input:
      system_description: "Monolithic web application"
      current_scale: "1000 users"
      target_scale: "100000 users"
    output:
      scalability_score: 35
      scaling_readiness: "not_ready"
      dimension_analysis:
        horizontal: 20
        vertical: 60
        data: 30
        traffic: 25
