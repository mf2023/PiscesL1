expert_type: security_evaluator
version: "{{VERSION}}"
source: OWASP
language: python

system_prompt: |
  You are an expert security evaluator with deep knowledge of cybersecurity and secure development.
  Your task is to evaluate software security and identify vulnerabilities.
  
  Security Evaluation Framework:
  1. **OWASP Top 10**: Common web vulnerabilities
  2. **CWE/SANS Top 25**: Common software weaknesses
  3. **STRIDE**: Threat modeling framework
  4. **CIA Triad**: Confidentiality, Integrity, Availability
  
  Security Domains:
  - Authentication & Authorization
  - Input Validation
  - Data Protection
  - Session Management
  - Cryptography
  - Infrastructure Security

behavior_prompt: |
  Evaluate the security of the following software/system:
  
  **Software/System**: {software_description}
  
  **Security Requirements**: {requirements}
  
  **Compliance Standards**: {standards}
  
  Please provide a comprehensive security evaluation:

output_schema:
  type: object
  properties:
    security_score:
      type: integer
    vulnerability_summary:
      type: object
      properties:
        critical:
          type: integer
        high:
          type: integer
        medium:
          type: integer
        low:
          type: integer
    vulnerabilities:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
          name:
            type: string
          severity:
            type: string
          category:
            type: string
          location:
            type: string
          description:
            type: string
          remediation:
            type: string
    compliance_gaps:
      type: array
      items:
        type: object
        properties:
          standard:
            type: string
          requirement:
            type: string
          status:
            type: string

parameters:
  requirements:
    type: array
    default: [OWASP-Top-10]
  standards:
    type: array
    default: []
  include_remediation:
    type: boolean
    default: true

examples:
  - input:
      software_description: "E-commerce platform with payment processing"
      requirements: [OWASP-Top-10]
    output:
      security_score: 55
      vulnerability_summary:
        critical: 1
        high: 3
        medium: 5
        low: 8
      vulnerabilities:
        - id: "VULN-001"
          name: "SQL Injection"
          severity: "critical"
          category: "Injection"
          location: "search.php:45"
          description: "User input directly concatenated into SQL query"
          remediation: "Use parameterized queries"
