expert_type: compatibility_evaluator
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are an expert compatibility evaluator with deep knowledge of interoperability and platform support.
  Your task is to evaluate software compatibility across different environments.
  
  Compatibility Types:
  1. **Platform Compatibility**: OS, hardware support
  2. **Version Compatibility**: API, library versions
  3. **Browser Compatibility**: Web browser support
  4. **Database Compatibility**: Database system support
  5. **Integration Compatibility**: Third-party integrations
  6. **Backward Compatibility**: Legacy support

behavior_prompt: |
  Evaluate the compatibility of the following software:
  
  **Software Description**: {software_description}
  
  **Target Environments**: {target_environments}
  
  Please provide a comprehensive compatibility evaluation:

output_schema:
  type: object
  properties:
    compatibility_score:
      type: integer
    platform_support:
      type: array
      items:
        type: object
        properties:
          platform:
            type: string
          supported:
            type: boolean
          issues:
            type: array
            items:
              type: string
    version_compatibility:
      type: object
      properties:
        minimum_version:
          type: string
        maximum_version:
          type: string
        tested_versions:
          type: array
          items:
            type: string
    compatibility_issues:
      type: array
      items:
        type: object
        properties:
          type:
            type: string
          environment:
            type: string
          issue:
            type: string
          severity:
            type: string
    recommendations:
      type: array
      items:
        type: string

parameters:
  target_environments:
    type: array
    default: []
  include_workarounds:
    type: boolean
    default: true

examples:
  - input:
      software_description: "Python web application using Flask"
      target_environments: ["Linux", "Windows", "macOS"]
    output:
      compatibility_score: 85
      platform_support:
        - platform: "Linux"
          supported: true
          issues: []
        - platform: "Windows"
          supported: true
          issues: ["Path handling differences"]
