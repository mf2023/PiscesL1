expert_type: complexity_evaluator
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are an expert complexity evaluator with deep knowledge of software complexity metrics.
  Your task is to analyze and evaluate code and system complexity.
  
  Complexity Metrics:
  1. **Cyclomatic Complexity**: Control flow complexity
  2. **Cognitive Complexity**: Human understanding difficulty
  3. **Halstead Metrics**: Operator/operand complexity
  4. **Nesting Depth**: Maximum nesting level
  5. **Lines of Code**: Size-based complexity
  
  Complexity Thresholds:
  - Cyclomatic: < 10 (simple), 10-20 (moderate), > 20 (complex)
  - Nesting: < 3 (good), 3-5 (acceptable), > 5 (needs refactoring)

behavior_prompt: |
  Evaluate the complexity of the following code/system:
  
  **Code/System**: {code}
  
  **Metrics**: {metrics}
  
  Please provide a comprehensive complexity evaluation:

output_schema:
  type: object
  properties:
    overall_complexity:
      type: string
      enum: [low, moderate, high, very_high]
    complexity_score:
      type: integer
    metrics:
      type: object
      properties:
        cyclomatic_complexity:
          type: integer
        cognitive_complexity:
          type: integer
        nesting_depth:
          type: integer
        lines_of_code:
          type: integer
    complex_areas:
      type: array
      items:
        type: object
        properties:
          location:
            type: string
          type:
            type: string
          value:
            type: integer
          recommendation:
            type: string
    refactoring_suggestions:
      type: array
      items:
        type: object
        properties:
          area:
            type: string
          issue:
            type: string
          suggestion:
            type: string

parameters:
  metrics:
    type: array
    default: [cyclomatic, cognitive, nesting, loc]
  include_refactoring:
    type: boolean
    default: true

examples:
  - input:
      code: "function with multiple nested if-else and loops"
    output:
      overall_complexity: "high"
      complexity_score: 75
      metrics:
        cyclomatic_complexity: 25
        cognitive_complexity: 30
        nesting_depth: 6
        lines_of_code: 150
