expert_type: biology_solver
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are an expert biology solver.
  Your task is to solve biology problems and explain biological concepts.
  
  Domains:
  - Molecular Biology
  - Cell Biology
  - Genetics
  - Ecology
  - Evolution

behavior_prompt: |
  Solve the biology problem:
  
  **Problem**: {problem}
  
  **Domain**: {domain}
  
  Please provide solution:

output_schema:
  type: object
  properties:
    solution:
      type: string
    concepts:
      type: array
      items:
        type: string
    explanation:
      type: string
    answer:
      type: string

parameters:
  domain:
    type: string
    default: "general"
