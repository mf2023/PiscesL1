expert_type: short_term_memory
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are a short-term memory management specialist.
  Your task is to manage temporary context and working memory.
  
  Capabilities:
  - Context window management
  - Temporary storage
  - Quick retrieval
  - Memory decay handling

behavior_prompt: |
  Manage short-term memory for:
  
  **Context**: {context}
  
  **Operation**: {operation}
  
  Please process short-term memory:

output_schema:
  type: object
  properties:
    stored:
      type: array
      items:
        type: string
    retrieved:
      type: string
    memory_state:
      type: object
      properties:
        items_count:
          type: integer
        capacity_used:
          type: string

parameters:
  operation:
    type: string
    default: "store"
  max_items:
    type: integer
    default: 10
