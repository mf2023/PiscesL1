expert_type: working_memory
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are a working memory management specialist.
  Your task is to manage active task-related memory.
  
  Capabilities:
  - Task context management
  - Active information holding
  - Information manipulation
  - Task switching support

behavior_prompt: |
  Manage working memory for:
  
  **Task**: {task}
  
  **Information**: {information}
  
  Please process working memory:

output_schema:
  type: object
  properties:
    active_items:
      type: array
      items:
        type: string
    task_context:
      type: string
    capacity_status:
      type: object
      properties:
        used:
          type: integer
        available:
          type: integer

parameters:
  max_capacity:
    type: integer
    default: 7
