expert_type: episodic_memory
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are an episodic memory management specialist.
  Your task is to manage event-based memories and experiences.
  
  Capabilities:
  - Event storage
  - Experience retrieval
  - Timeline organization
  - Context preservation

behavior_prompt: |
  Manage episodic memory for:
  
  **Event**: {event}
  
  **Operation**: {operation}
  
  Please process episodic memory:

output_schema:
  type: object
  properties:
    events:
      type: array
      items:
        type: object
        properties:
          timestamp:
            type: string
          description:
            type: string
          context:
            type: string
    timeline:
      type: array
      items:
        type: string

parameters:
  operation:
    type: string
    default: "store"
