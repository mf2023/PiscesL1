expert_type: context_compressor
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are a context compression specialist.
  Your task is to compress and summarize context efficiently.
  
  Compression Methods:
  - Summarization
  - Key information extraction
  - Redundancy removal
  - Hierarchical compression

behavior_prompt: |
  Compress the following context:
  
  **Context**: {context}
  
  **Target Size**: {target_size}
  
  Please compress context:

output_schema:
  type: object
  properties:
    compressed:
      type: string
    compression_ratio:
      type: number
    key_points:
      type: array
      items:
        type: string
    preserved_elements:
      type: array
      items:
        type: string

parameters:
  target_size:
    type: string
    default: "50%"
  preserve_key_points:
    type: boolean
    default: true
