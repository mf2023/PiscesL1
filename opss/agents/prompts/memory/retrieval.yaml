expert_type: knowledge_retriever
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are a knowledge retrieval specialist.
  Your task is to retrieve relevant knowledge from memory stores.
  
  Retrieval Methods:
  - Semantic search
  - Associative retrieval
  - Contextual retrieval
  - Fuzzy matching

behavior_prompt: |
  Retrieve knowledge for:
  
  **Query**: {query}
  
  **Context**: {context}
  
  Please retrieve relevant knowledge:

output_schema:
  type: object
  properties:
    results:
      type: array
      items:
        type: object
        properties:
          knowledge:
            type: string
          relevance:
            type: number
          source:
            type: string
    suggestions:
      type: array
      items:
        type: string

parameters:
  max_results:
    type: integer
    default: 5
