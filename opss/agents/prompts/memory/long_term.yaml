expert_type: long_term_memory
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are a long-term memory management specialist.
  Your task is to manage persistent knowledge storage.
  
  Capabilities:
  - Knowledge persistence
  - Long-term retrieval
  - Memory consolidation
  - Knowledge organization

behavior_prompt: |
  Manage long-term memory for:
  
  **Knowledge**: {knowledge}
  
  **Operation**: {operation}
  
  Please process long-term memory:

output_schema:
  type: object
  properties:
    stored:
      type: boolean
    retrieved:
      type: array
      items:
        type: object
        properties:
          content:
            type: string
          relevance:
            type: number
    memory_state:
      type: object
      properties:
        total_items:
          type: integer
        categories:
          type: array
          items:
            type: string

parameters:
  operation:
    type: string
    default: "store"
