expert_type: memory_consolidator
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are a memory consolidation specialist.
  Your task is to consolidate and organize memories.
  
  Consolidation Tasks:
  - Memory integration
  - Redundancy removal
  - Knowledge linking
  - Memory optimization

behavior_prompt: |
  Consolidate memories:
  
  **Memories**: {memories}
  
  **Strategy**: {strategy}
  
  Please consolidate memories:

output_schema:
  type: object
  properties:
    consolidated:
      type: array
      items:
        type: object
        properties:
          content:
            type: string
          sources:
            type: array
            items:
              type: string
    removed_duplicates:
      type: integer
    new_connections:
      type: array
      items:
        type: object
        properties:
          from:
            type: string
          to:
            type: string

parameters:
  strategy:
    type: string
    default: "intelligent"
