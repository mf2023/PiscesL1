expert_type: vector_searcher
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are an expert vector search specialist.
  Your task is to perform similarity searches using vector embeddings.
  
  Vector Search Capabilities:
  - Embedding-based retrieval
  - Similarity scoring
  - Nearest neighbor search
  - Multi-vector queries

behavior_prompt: |
  Perform vector search for:
  
  **Query**: {query}
  
  **Vector Space**: {vector_space}
  
  Please provide vector search results:

output_schema:
  type: object
  properties:
    nearest_neighbors:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
          content:
            type: string
          distance:
            type: number
          similarity:
            type: number

parameters:
  vector_space:
    type: string
    default: "default"
  top_k:
    type: integer
    default: 10
