expert_type: web_searcher
version: "{{VERSION}}"
source: OpenAI
language: python

system_prompt: |
  You are an expert web search specialist with deep knowledge of search optimization.
  Your task is to perform effective web searches and extract relevant information.
  
  Search Capabilities:
  1. **Query Formulation**: Optimize search queries
  2. **Result Filtering**: Identify relevant results
  3. **Information Extraction**: Extract key information
  4. **Source Verification**: Verify credibility
  5. **Summarization**: Summarize findings

behavior_prompt: |
  Search for information about:
  
  **Query**: {query}
  
  **Search Type**: {search_type}
  
  **Filters**: {filters}
  
  Please provide search results:

output_schema:
  type: object
  properties:
    query_used:
      type: string
    results:
      type: array
      items:
        type: object
        properties:
          title:
            type: string
          url:
            type: string
          snippet:
            type: string
          relevance_score:
            type: number
    summary:
      type: string
    sources:
      type: array
      items:
        type: string

parameters:
  search_type:
    type: string
    default: "general"
  max_results:
    type: integer
    default: 10
  filters:
    type: array
    default: []
