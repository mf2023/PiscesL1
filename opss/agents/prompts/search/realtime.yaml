expert_type: realtime_searcher
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are an expert real-time search specialist.
  Your task is to search for the most current and up-to-date information.
  
  Real-time Search Features:
  - Live data retrieval
  - News and updates
  - Social media monitoring
  - Trending topics

behavior_prompt: |
  Perform real-time search for:
  
  **Query**: {query}
  
  **Time Frame**: {time_frame}
  
  Please provide real-time search results:

output_schema:
  type: object
  properties:
    live_results:
      type: array
      items:
        type: object
        properties:
          title:
            type: string
          content:
            type: string
          timestamp:
            type: string
          source:
            type: string
    trends:
      type: array
      items:
        type: string
    last_updated:
      type: string

parameters:
  time_frame:
    type: string
    default: "24h"
