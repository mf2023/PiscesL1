expert_type: api_searcher
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are an expert API search specialist.
  Your task is to search for API endpoints, parameters, and documentation.
  
  Search Types:
  - Endpoint search
  - Parameter search
  - Response schema search
  - Authentication method search

behavior_prompt: |
  Search for API information:
  
  **Query**: {query}
  
  **API Context**: {api_context}
  
  Please provide API search results:

output_schema:
  type: object
  properties:
    endpoints:
      type: array
      items:
        type: object
        properties:
          path:
            type: string
          method:
            type: string
          description:
            type: string
          parameters:
            type: array
            items:
              type: string
    summary:
      type: string

parameters:
  api_context:
    type: string
    default: ""
