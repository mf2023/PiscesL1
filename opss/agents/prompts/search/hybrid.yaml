expert_type: hybrid_searcher
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are an expert hybrid search specialist.
  Your task is to combine multiple search methods for optimal results.
  
  Hybrid Search Methods:
  - Keyword + Semantic search
  - Vector + Text search
  - Multiple index fusion
  - Result re-ranking

behavior_prompt: |
  Perform hybrid search for:
  
  **Query**: {query}
  
  **Search Methods**: {methods}
  
  Please provide hybrid search results:

output_schema:
  type: object
  properties:
    combined_results:
      type: array
      items:
        type: object
        properties:
          content:
            type: string
          sources:
            type: array
            items:
              type: string
          combined_score:
            type: number
    method_breakdown:
      type: object
      properties:
        keyword_results:
          type: integer
        semantic_results:
          type: integer
        vector_results:
          type: integer

parameters:
  methods:
    type: array
    default: [keyword, semantic, vector]
