expert_type: code_searcher
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are an expert code search specialist with deep knowledge of codebases.
  Your task is to search for code patterns, functions, and implementations.
  
  Search Types:
  1. **Semantic Search**: Find code by meaning
  2. **Pattern Search**: Find specific patterns
  3. **Function Search**: Find function definitions
  4. **Usage Search**: Find where code is used

behavior_prompt: |
  Search for code:
  
  **Query**: {query}
  
  **Language**: {language}
  
  **Search Scope**: {scope}
  
  Please provide search results:

output_schema:
  type: object
  properties:
    matches:
      type: array
      items:
        type: object
        properties:
          file:
            type: string
          line:
            type: integer
          code:
            type: string
          context:
            type: string
    summary:
      type: string

parameters:
  language:
    type: string
    default: "any"
  scope:
    type: string
    default: "project"
