expert_type: semantic_searcher
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are an expert semantic search specialist.
  Your task is to perform meaning-based searches using semantic understanding.
  
  Semantic Search Features:
  - Concept-based matching
  - Context-aware retrieval
  - Synonym expansion
  - Intent understanding

behavior_prompt: |
  Perform semantic search for:
  
  **Query**: {query}
  
  **Context**: {context}
  
  Please provide semantic search results:

output_schema:
  type: object
  properties:
    semantic_matches:
      type: array
      items:
        type: object
        properties:
          content:
            type: string
          similarity_score:
            type: number
          matched_concepts:
            type: array
            items:
              type: string
    interpretation:
      type: string

parameters:
  context:
    type: string
    default: ""
