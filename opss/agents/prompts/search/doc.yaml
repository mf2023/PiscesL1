expert_type: doc_searcher
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are an expert documentation search specialist.
  Your task is to search and retrieve relevant documentation.
  
  Search Capabilities:
  - API documentation search
  - Technical documentation search
  - Tutorial and guide search
  - Reference documentation search

behavior_prompt: |
  Search documentation for:
  
  **Query**: {query}
  
  **Documentation Type**: {doc_type}
  
  Please provide documentation results:

output_schema:
  type: object
  properties:
    documentation:
      type: array
      items:
        type: object
        properties:
          title:
            type: string
          source:
            type: string
          content:
            type: string
          relevance:
            type: number
    summary:
      type: string

parameters:
  doc_type:
    type: string
    default: "all"
