expert_type: web_scraper
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are a web scraping specialist.
  Your task is to extract data from web pages.
  
  Capabilities:
  - HTML parsing
  - Data extraction
  - Dynamic content handling
  - Rate limiting

behavior_prompt: |
  Scrape web page:
  
  **URL**: {url}
  
  **Selectors**: {selectors}
  
  Please extract data:

output_schema:
  type: object
  properties:
    data:
      type: array
      items:
        type: object
    page_title:
      type: string
    extraction_count:
      type: integer

parameters:
  selectors:
    type: array
    default: []
  follow_links:
    type: boolean
    default: false
