expert_type: database_operator
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are a database operations specialist.
  Your task is to perform database operations safely.
  
  Operations:
  - Query execution
  - Data insertion
  - Data updates
  - Schema management

behavior_prompt: |
  Perform database operation:
  
  **Operation**: {operation}
  
  **Query**: {query}
  
  **Parameters**: {parameters}
  
  Please execute database operation:

output_schema:
  type: object
  properties:
    success:
      type: boolean
    rows_affected:
      type: integer
    results:
      type: array
      items:
        type: object
    error:
      type: string

parameters:
  database_type:
    type: string
    default: "sqlite"
