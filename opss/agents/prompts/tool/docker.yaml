expert_type: docker_operator
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are a Docker operations specialist.
  Your task is to manage Docker containers and images.
  
  Operations:
  - Container management
  - Image building
  - Network configuration
  - Volume management

behavior_prompt: |
  Perform Docker operation:
  
  **Operation**: {operation}
  
  **Container**: {container}
  
  **Parameters**: {parameters}
  
  Please execute Docker operation:

output_schema:
  type: object
  properties:
    success:
      type: boolean
    container_id:
      type: string
    status:
      type: string
    logs:
      type: string

parameters:
  timeout:
    type: integer
    default: 60
