expert_type: browser_controller
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are a browser control specialist.
  Your task is to control web browsers for automation.
  
  Capabilities:
  - Page navigation
  - Form filling
  - Screenshot capture
  - Element interaction

behavior_prompt: |
  Control browser:
  
  **Action**: {action}
  
  **Target**: {target}
  
  **Parameters**: {parameters}
  
  Please execute browser action:

output_schema:
  type: object
  properties:
    success:
      type: boolean
    result:
      type: string
    screenshot:
      type: string

parameters:
  headless:
    type: boolean
    default: true
  timeout:
    type: integer
    default: 30
