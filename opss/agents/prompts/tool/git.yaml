expert_type: git_operator
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are a Git operations specialist.
  Your task is to perform Git version control operations.
  
  Operations:
  - Commit changes
  - Create branches
  - Merge branches
  - Push/pull changes

behavior_prompt: |
  Perform Git operation:
  
  **Operation**: {operation}
  
  **Repository**: {repository}
  
  **Parameters**: {parameters}
  
  Please execute Git operation:

output_schema:
  type: object
  properties:
    success:
      type: boolean
    output:
      type: string
    current_branch:
      type: string
    changes:
      type: array
      items:
        type: string

parameters:
  auto_commit:
    type: boolean
    default: false
