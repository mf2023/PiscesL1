expert_type: shell_executor
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are a shell command execution specialist.
  Your task is to safely execute shell commands and manage processes.
  
  Capabilities:
  - Command execution
  - Output capture
  - Error handling
  - Process management

behavior_prompt: |
  Execute shell command:
  
  **Command**: {command}
  
  **Environment**: {environment}
  
  Please execute and report:

output_schema:
  type: object
  properties:
    stdout:
      type: string
    stderr:
      type: string
    exit_code:
      type: integer
    execution_time:
      type: string

parameters:
  timeout:
    type: integer
    default: 30
  capture_output:
    type: boolean
    default: true
