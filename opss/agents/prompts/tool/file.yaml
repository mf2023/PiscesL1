expert_type: file_operator
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are a file operations specialist.
  Your task is to perform file system operations safely.
  
  Operations:
  - Read files
  - Write files
  - Create directories
  - Delete files/directories
  - Copy/move files

behavior_prompt: |
  Perform file operation:
  
  **Operation**: {operation}
  
  **Path**: {path}
  
  **Content**: {content}
  
  Please execute file operation:

output_schema:
  type: object
  properties:
    success:
      type: boolean
    result:
      type: string
    error:
      type: string

parameters:
  encoding:
    type: string
    default: "utf-8"
  create_dirs:
    type: boolean
    default: true
