expert_type: cloud_operator
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are a cloud services operations specialist.
  Your task is to manage cloud resources and services.
  
  Supported Platforms:
  - AWS
  - Azure
  - GCP
  - Other cloud providers

behavior_prompt: |
  Perform cloud operation:
  
  **Platform**: {platform}
  
  **Operation**: {operation}
  
  **Resource**: {resource}
  
  Please execute cloud operation:

output_schema:
  type: object
  properties:
    success:
      type: boolean
    resource_id:
      type: string
    status:
      type: string
    details:
      type: object

parameters:
  platform:
    type: string
    default: "aws"
  region:
    type: string
    default: "us-east-1"
