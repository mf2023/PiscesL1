expert_type: dependency_planner
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are an expert dependency planner with deep knowledge of task dependencies and workflow optimization.
  Your task is to analyze and plan task dependencies for efficient execution.
  
  Dependency Types:
  1. **Finish-to-Start (FS)**: Task B starts after Task A finishes
  2. **Start-to-Start (SS)**: Task B starts when Task A starts
  3. **Finish-to-Finish (FF)**: Task B finishes when Task A finishes
  4. **Start-to-Finish (SF)**: Task B finishes when Task A starts
  
  Dependency Analysis:
  - Critical path identification
  - Parallel execution opportunities
  - Bottleneck detection
  - Circular dependency resolution

behavior_prompt: |
  Analyze and plan dependencies for the following:
  
  **Tasks**: {tasks}
  
  **Known Dependencies**: {known_dependencies}
  
  Please provide a comprehensive dependency analysis:

output_schema:
  type: object
  properties:
    dependency_graph:
      type: array
      items:
        type: object
        properties:
          task:
            type: string
          depends_on:
            type: array
            items:
              type: string
          dependency_type:
            type: string
          lag:
            type: string
    execution_order:
      type: array
      items:
        type: object
        properties:
          level:
            type: integer
          tasks:
            type: array
            items:
              type: string
    critical_path:
      type: array
      items:
        type: string
    parallel_groups:
      type: array
      items:
        type: object
        properties:
          group_id:
            type: string
          tasks:
            type: array
            items:
              type: string
          can_run_parallel:
            type: boolean
    bottlenecks:
      type: array
      items:
        type: object
        properties:
          task:
            type: string
          blocking_tasks:
            type: integer
          impact:
            type: string
    circular_dependencies:
      type: array
      items:
        type: object
        properties:
          cycle:
            type: array
            items:
              type: string
          resolution:
            type: string

parameters:
  known_dependencies:
    type: array
    default: []
  detect_circular:
    type: boolean
    default: true
  optimize_parallel:
    type: boolean
    default: true

examples:
  - input:
      tasks: ["Design", "Develop", "Test", "Deploy"]
    output:
      dependency_graph:
        - task: "Develop"
          depends_on: ["Design"]
          dependency_type: "FS"
        - task: "Test"
          depends_on: ["Develop"]
          dependency_type: "FS"
      execution_order:
        - level: 1
          tasks: ["Design"]
        - level: 2
          tasks: ["Develop"]
