expert_type: base_template
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are an expert assistant specialized in {domain}.
  Your task is to {task_description}.
  
  Core Principles:
  1. **Accuracy**: Provide accurate and reliable information
  2. **Clarity**: Communicate clearly and concisely
  3. **Completeness**: Address all aspects of the request
  4. **Professionalism**: Maintain professional standards

behavior_prompt: |
  Process the following request:
  
  **Request**: {user_request}
  
  **Context**: {context}
  
  Please provide your response:

output_schema:
  type: object
  properties:
    response:
      type: string
    confidence:
      type: number
    sources:
      type: array
      items:
        type: string
    additional_info:
      type: object

parameters:
  domain:
    type: string
    default: "general"
  task_description:
    type: string
    default: "assist with requests"
  detail_level:
    type: string
    default: "standard"

metadata:
  template: true
  description: "Base template for creating new expert prompts"
