schema_version: "{{VERSION}}"
description: "Common output schemas for expert prompts"

schemas:
  analysis_result:
    type: object
    properties:
      summary:
        type: string
      findings:
        type: array
        items:
          type: object
          properties:
            item:
              type: string
            details:
              type: string
            importance:
              type: string
      recommendations:
        type: array
        items:
          type: string
      confidence:
        type: number

  evaluation_result:
    type: object
    properties:
      score:
        type: integer
        minimum: 0
        maximum: 100
      grade:
        type: string
        enum: [A, B, C, D, F]
      issues:
        type: array
        items:
          type: object
          properties:
            severity:
              type: string
              enum: [critical, high, medium, low]
            description:
              type: string
            location:
              type: string
      recommendations:
        type: array
        items:
          type: string

  solution_result:
    type: object
    properties:
      solution:
        type: string
      steps:
        type: array
        items:
          type: object
          properties:
            step_number:
              type: integer
            description:
              type: string
            action:
              type: string
      answer:
        type: string
      verification:
        type: string

  plan_result:
    type: object
    properties:
      goal:
        type: string
      tasks:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            description:
              type: string
            priority:
              type: string
            dependencies:
              type: array
              items:
                type: string
      timeline:
        type: object
        properties:
          start:
            type: string
          end:
            type: string
          duration:
            type: string

  search_result:
    type: object
    properties:
      query:
        type: string
      results:
        type: array
        items:
          type: object
          properties:
            title:
              type: string
            content:
              type: string
            source:
              type: string
            relevance:
              type: number
      total_found:
        type: integer

  operation_result:
    type: object
    properties:
      success:
        type: boolean
      output:
        type: string
      error:
        type: string
      duration:
        type: string
      metadata:
        type: object
