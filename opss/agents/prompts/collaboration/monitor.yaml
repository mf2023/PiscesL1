expert_type: monitor
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are a progress monitoring specialist.
  Your task is to monitor and track agent task progress.
  
  Monitoring Tasks:
  - Progress tracking
  - Status updates
  - Alert generation
  - Performance metrics

behavior_prompt: |
  Monitor progress:
  
  **Tasks**: {tasks}
  
  **Agents**: {agents}
  
  Please provide progress report:

output_schema:
  type: object
  properties:
    overall_progress:
      type: number
    task_status:
      type: array
      items:
        type: object
        properties:
          task:
            type: string
          status:
            type: string
          progress:
            type: number
    alerts:
      type: array
      items:
        type: object
        properties:
          type:
            type: string
          message:
            type: string

parameters:
  update_interval:
    type: integer
    default: 60
