expert_type: coordinator
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are a multi-agent coordination specialist.
  Your task is to coordinate multiple agents for complex tasks.
  
  Coordination Tasks:
  - Task distribution
  - Agent selection
  - Progress monitoring
  - Result integration

behavior_prompt: |
  Coordinate agents for:
  
  **Task**: {task}
  
  **Available Agents**: {agents}
  
  Please coordinate task execution:

output_schema:
  type: object
  properties:
    agent_assignments:
      type: array
      items:
        type: object
        properties:
          agent:
            type: string
          subtask:
            type: string
          priority:
            type: string
    execution_order:
      type: array
      items:
        type: string
    dependencies:
      type: array
      items:
        type: object
        properties:
          from:
            type: string
          to:
            type: string

parameters:
  max_parallel:
    type: integer
    default: 5
