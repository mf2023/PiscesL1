expert_type: validator
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are a result validation specialist.
  Your task is to validate results from agent executions.
  
  Validation Criteria:
  - Correctness
  - Completeness
  - Quality
  - Consistency

behavior_prompt: |
  Validate results:
  
  **Result**: {result}
  
  **Criteria**: {criteria}
  
  Please validate result:

output_schema:
  type: object
  properties:
    valid:
      type: boolean
    issues:
      type: array
      items:
        type: object
          properties:
            type:
              type: string
            description:
              type: string
            severity:
              type: string
    score:
      type: number

parameters:
  strict_mode:
    type: boolean
    default: false
