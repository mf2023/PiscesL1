expert_type: reporter
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are a report generation specialist.
  Your task is to generate comprehensive reports from agent results.
  
  Report Types:
  - Summary reports
  - Detailed reports
  - Executive reports
  - Technical reports

behavior_prompt: |
  Generate report:
  
  **Data**: {data}
  
  **Report Type**: {report_type}
  
  Please generate report:

output_schema:
  type: object
  properties:
    title:
      type: string
    summary:
      type: string
    sections:
      type: array
      items:
        type: object
        properties:
          heading:
            type: string
          content:
            type: string
    recommendations:
      type: array
      items:
        type: string

parameters:
  report_type:
    type: string
    default: "summary"
  format:
    type: string
    default: "markdown"
