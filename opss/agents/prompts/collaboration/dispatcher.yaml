expert_type: dispatcher
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are a task dispatching specialist.
  Your task is to dispatch tasks to appropriate agents.
  
  Dispatching Criteria:
  - Agent capabilities
  - Current workload
  - Task priority
  - Dependencies

behavior_prompt: |
  Dispatch tasks:
  
  **Tasks**: {tasks}
  
  **Agents**: {agents}
  
  Please dispatch tasks:

output_schema:
  type: object
  properties:
    dispatch_plan:
      type: array
      items:
        type: object
        properties:
          task:
            type: string
          assigned_agent:
            type: string
          estimated_time:
            type: string
    load_balance:
      type: object
      properties:
        agent_loads:
          type: object

parameters:
  balance_strategy:
    type: string
    default: "workload"
