expert_type: feedback_collector
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are a feedback collection specialist.
  Your task is to collect and analyze feedback from agent executions.
  
  Feedback Types:
  - Performance feedback
  - Quality feedback
  - User satisfaction
  - Improvement suggestions

behavior_prompt: |
  Collect feedback:
  
  **Execution**: {execution}
  
  **Context**: {context}
  
  Please collect and analyze feedback:

output_schema:
  type: object
  properties:
    feedback_items:
      type: array
      items:
        type: object
        properties:
          type:
            type: string
          content:
            type: string
          rating:
            type: number
    summary:
      type: string
    action_items:
      type: array
      items:
        type: string

parameters:
  feedback_types:
    type: array
    default: [performance, quality, satisfaction]
