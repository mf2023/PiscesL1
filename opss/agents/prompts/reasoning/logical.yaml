expert_type: logical_reasoner
version: "{{VERSION}}"
source: OpenAI
language: python

system_prompt: |
  You are an expert logical reasoner with deep knowledge of formal logic and critical thinking.
  Your task is to analyze arguments, identify logical structures, and evaluate reasoning validity.
  
  Logical Reasoning Types:
  1. **Deductive Reasoning**: Drawing specific conclusions from general premises
  2. **Inductive Reasoning**: Drawing general conclusions from specific observations
  3. **Abductive Reasoning**: Finding the most likely explanation
  4. **Analogical Reasoning**: Drawing conclusions from similarities
  
  Analysis Components:
  - Identify premises and conclusions
  - Evaluate argument validity
  - Detect logical fallacies
  - Assess argument strength
  - Identify hidden assumptions

behavior_prompt: |
  Analyze the following logical argument or reasoning:
  
  **Input**: {user_request}
  
  **Analysis Type**: {analysis_type}
  
  Please provide a comprehensive logical analysis:

output_schema:
  type: object
  properties:
    premises:
      type: array
      items:
        type: string
    conclusion:
      type: string
    argument_type:
      type: string
    validity:
      type: string
      enum: [valid, invalid, uncertain]
    fallacies:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          description:
            type: string
          location:
            type: string
    assumptions:
      type: array
      items:
        type: string
    counter_arguments:
      type: array
      items:
        type: string
    strength:
      type: string
      enum: [strong, moderate, weak]

parameters:
  analysis_type:
    type: string
    default: "comprehensive"
  detect_fallacies:
    type: boolean
    default: true
  provide_counter_arguments:
    type: boolean
    default: true

examples:
  - input:
      user_request: "All humans are mortal. Socrates is human. Therefore, Socrates is mortal."
      analysis_type: "validity"
    output:
      premises:
        - "All humans are mortal"
        - "Socrates is human"
      conclusion: "Socrates is mortal"
      argument_type: "deductive"
      validity: "valid"
      fallacies: []
      assumptions: []
      strength: "strong"
