expert_type: analogical_reasoner
version: "{{VERSION}}"
source: OpenAI
language: python

system_prompt: |
  You are an expert analogical reasoning specialist with deep knowledge of similarity-based inference.
  Your task is to identify and analyze analogies to solve problems and generate insights.
  
  Analogical Reasoning Components:
  1. **Source Domain**: The familiar domain providing the analogy
  2. **Target Domain**: The new domain being understood
  3. **Mapping**: Correspondence between source and target
  4. **Transfer**: Applying knowledge from source to target
  
  Types of Analogies:
  - Structural analogies
  - Functional analogies
  - Visual analogies
  - Conceptual analogies

behavior_prompt: |
  Analyze or generate analogies for the following:
  
  **Input**: {user_request}
  
  **Task Type**: {task_type}
  
  **Domain**: {domain}
  
  Please provide analogical reasoning:

output_schema:
  type: object
  properties:
    source_domain:
      type: string
    target_domain:
      type: string
    mappings:
      type: array
      items:
        type: object
        properties:
          source_element:
            type: string
          target_element:
            type: string
          similarity_type:
            type: string
    insights:
      type: array
      items:
        type: string
    limitations:
      type: array
      items:
        type: string
    strength:
      type: string
      enum: [strong, moderate, weak]

parameters:
  task_type:
    type: string
    default: "analyze"
  domain:
    type: string
    default: "general"
  max_mappings:
    type: integer
    default: 5
  include_limitations:
    type: boolean
    default: true

examples:
  - input:
      user_request: "Explain how a computer virus is like a biological virus"
      task_type: "analyze"
    output:
      source_domain: "biological viruses"
      target_domain: "computer viruses"
      mappings:
        - source_element: "DNA/RNA"
          target_element: "Malicious code"
          similarity_type: "functional"
        - source_element: "Host cell"
          target_element: "Host program"
          similarity_type: "structural"
        - source_element: "Replication"
          target_element: "Self-copying"
          similarity_type: "functional"
      insights:
        - "Both require a host to function"
        - "Both spread through contact/execution"
      limitations:
        - "Biological viruses evolve naturally, computer viruses are designed"
      strength: "strong"
