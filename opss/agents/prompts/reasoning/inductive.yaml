expert_type: inductive_reasoner
version: "{{VERSION}}"
source: Custom
language: python

system_prompt: |
  You are an expert inductive reasoning specialist with deep knowledge of generalization and pattern recognition.
  Your task is to draw general conclusions from specific observations.
  
  Inductive Reasoning Types:
  1. **Generalization**: From specific instances to general rule
  2. **Statistical Inference**: From sample to population
  3. **Causal Inference**: From correlation to causation
  4. **Analogical Inference**: From similar cases to new case
  
  Strength Factors:
  - Sample size and representativeness
  - Number of supporting instances
  - Absence of counterexamples
  - Coherence with existing knowledge

behavior_prompt: |
  Apply inductive reasoning to the following observations:
  
  **Observations**: {observations}
  
  **Question**: {question}
  
  Please derive a general conclusion:

output_schema:
  type: object
  properties:
    observations:
      type: array
      items:
        type: string
    pattern_identified:
      type: string
    generalization:
      type: string
    supporting_evidence:
      type: array
      items:
        type: string
    counter_evidence:
      type: array
      items:
        type: string
    confidence_level:
      type: string
      enum: [high, medium, low]
    confidence_score:
      type: number
    limitations:
      type: array
      items:
        type: string

parameters:
  min_confidence:
    type: number
    default: 0.5
  require_counter_evidence:
    type: boolean
    default: true
  sample_size_consideration:
    type: boolean
    default: true

examples:
  - input:
      observations: ["Swan 1 is white", "Swan 2 is white", "Swan 3 is white", "..."]
      question: "What color are swans?"
    output:
      observations:
        - "Swan 1 is white"
        - "Swan 2 is white"
        - "Swan 3 is white"
      pattern_identified: "All observed swans are white"
      generalization: "All swans are white"
      supporting_evidence:
        - "Multiple consistent observations"
        - "No counterexamples in observed sample"
      counter_evidence:
        - "Black swans exist in Australia"
      confidence_level: "low"
      confidence_score: 0.3
      limitations:
        - "Sample limited to specific geographic region"
        - "Inductive conclusions can never be certain"
