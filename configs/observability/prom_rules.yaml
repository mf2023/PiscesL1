# Alert rule groups for PISCES LLM observability.
groups:
- # Configuration for the PISCES LLM observability alert group.
  name: pisces-llm-observability
  # Evaluation interval for the rules in this group.
  interval: 30s
  # List of alert rules.
  rules:
  # Alert when the LLM error rate exceeds 10% for 10 minutes.
  - alert: LLMHighErrorRate
    # Calculate the error rate over 5 minutes and trigger if it exceeds 10%.
    expr: sum(rate(llm_errors_total[5m])) / clamp_min(sum(rate(llm_requests_total[5m])), 1) > 0.1
    # Duration for which the condition must hold before alerting.
    for: 10m
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: ml
    # Annotations providing additional information about the alert.
    annotations:
      summary: "High LLM error rate"
      description: "LLM error rate exceeds 10% for 10 minutes. Investigate the provider or model."
  # Alert when the LLM error rate exceeds 30% for 5 minutes.
  - alert: LLMExtremeErrorRate
    # Calculate the error rate over 5 minutes and trigger if it exceeds 30%.
    expr: sum(rate(llm_errors_total[5m])) / clamp_min(sum(rate(llm_requests_total[5m])), 1) > 0.3
    # Duration for which the condition must hold before alerting.
    for: 5m
    # Labels for categorizing the alert.
    labels:
      severity: critical
      team: ml
    # Annotations providing additional information about the alert.
    annotations:
      summary: "Critical LLM error rate"
      description: "LLM error rate exceeds 30% for 5 minutes. Immediate action required."
  # Alert when the LLM p95 latency exceeds 1500ms for 10 minutes.
  - alert: LLMLatencyP95High
    # Calculate the p95 latency over 5 minutes and trigger if it exceeds 1500ms.
    expr: histogram_quantile(0.95, sum by (le) (rate(llm_latency_ms_bucket[5m]))) > 1500
    # Duration for which the condition must hold before alerting.
    for: 10m
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: ml
    # Annotations providing additional information about the alert.
    annotations:
      summary: "LLM p95 latency high"
      description: "LLM p95 latency exceeds 1500ms for 10 minutes. Check load, backend, or model changes."
  # Alert when the streaming time-to-first-token p95 exceeds 800ms for 10 minutes.
  - alert: LLMStreamTTFTDegraded
    # Calculate the p95 streaming time-to-first-token over 5 minutes and trigger if it exceeds 800ms.
    expr: histogram_quantile(0.95, sum by (le) (rate(llm_stream_ttft_ms_bucket[5m]))) > 800
    # Duration for which the condition must hold before alerting.
    for: 10m
    # Labels for categorizing the alert.
    labels:
      team: ml
    # Annotations providing additional information about the alert.
    annotations:
      summary: "Streaming TTFT p95 degraded"
      description: "Streaming time-to-first-token p95 exceeds 800ms for 10 minutes."
  # Alert when Prom/OTLP exporters encounter errors.
  - alert: ExporterFailures
    # Count exporter errors over 5 minutes and trigger if any errors are detected.
    expr: sum(rate(exporter_errors_total[5m])) > 0
    # Duration for which the condition must hold before alerting.
    for: 5m
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: platform
    # Annotations providing additional information about the alert.
    annotations:
      summary: "Exporter errors detected"
      description: "Prom/OTLP exporters are failing. Check file permissions, endpoints, or network."
  # Alert when no exporter success is observed for more than 10 minutes.
  - alert: ExporterStaleSuccess
    # Calculate the time since the last exporter success and trigger if it exceeds 600 seconds.
    expr: (time() - max(exporter_last_success_timestamp_seconds)) > 600
    # Duration for which the condition must hold before alerting.
    for: 10m
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: platform
    # Annotations providing additional information about the alert.
    annotations:
      summary: "Exporter success stale"
      description: "No exporter success observed for more than 10 minutes. Check exporters' background threads and destinations."
  # Alert when the service heartbeat is missing for 10 minutes.
  - alert: HeartbeatMissing
    # Check if the service heartbeat is missing over 5 minutes and trigger if it is.
    expr: max_over_time(service_heartbeat[5m]) < 1
    # Duration for which the condition must hold before alerting.
    for: 10m
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: platform
    # Annotations providing additional information about the alert.
    annotations:
      summary: "Service heartbeat missing"
      description: "service.heartbeat not observed in the last 5 minutes. The service might be down or the exporter not running."

  # System & Throughput related alerts
  # Alert when the system CPU usage exceeds 90% for 10 minutes.
  - alert: SystemCpuHigh
    # Calculate the average system CPU usage over 5 minutes and trigger if it exceeds 90%.
    expr: avg_over_time(runtime_system_cpu_percent[5m]) > 90
    # Duration for which the condition must hold before alerting.
    for: 10m
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: platform
    # Annotations providing additional information about the alert.
    annotations:
      summary: "System CPU usage high"
      description: "Average system CPU usage exceeds 90% for 10 minutes. Consider scaling or optimizing CPU-intensive tasks."

  # Alert when the system memory usage exceeds 90% for 10 minutes.
  - alert: SystemMemoryHigh
    # Calculate the average system memory usage over 5 minutes and trigger if it exceeds 90%.
    expr: avg_over_time(runtime_system_memory_percent[5m]) > 90
    # Duration for which the condition must hold before alerting.
    for: 10m
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: platform
    # Annotations providing additional information about the alert.
    annotations:
      summary: "System memory usage high"
      description: "Average system memory usage exceeds 90% for 10 minutes. Consider memory optimization or scaling."

  # Alert when the LLM throughput is below 0.1 requests per second for 15 minutes.
  - alert: LLMThroughputLow
    # Calculate the LLM request rate over 5 minutes and trigger if it is below 0.1 req/s.
    expr: sum(rate(llm_requests_total[5m])) < 0.1
    # Duration for which the condition must hold before alerting.
    for: 15m
    # Labels for categorizing the alert.
    labels:
      severity: info
      team: ml
    # Annotations providing additional information about the alert.
    annotations:
      summary: "LLM throughput low"
      description: "Global LLM request throughput is below 0.1 req/s for 15 minutes. Validate the traffic source or pipeline status."

  # Alert when the network RX throughput exceeds 100 MB/s for 10 minutes.
  - alert: NetworkRxHigh
    # Calculate the average network RX bytes per second over 5 minutes and trigger if it exceeds 100 MB/s.
    expr: avg_over_time(runtime_net_rx_bytes_per_sec[5m]) > 1e8  # ~100 MB/s
    # Duration for which the condition must hold before alerting.
    for: 10m
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: platform
    # Annotations providing additional information about the alert.
    annotations:
      summary: "High network RX throughput"
      description: "Average network RX bytes per second exceeds 100MB/s for 10 minutes. Validate upstream load or potential data storm."

  # Alert when the network TX throughput exceeds 100 MB/s for 10 minutes.
  - alert: NetworkTxHigh
    # Calculate the average network TX bytes per second over 5 minutes and trigger if it exceeds 100 MB/s.
    expr: avg_over_time(runtime_net_tx_bytes_per_sec[5m]) > 1e8  # ~100 MB/s
    # Duration for which the condition must hold before alerting.
    for: 10m
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: platform
    # Annotations providing additional information about the alert.
    annotations:
      summary: "High network TX throughput"
      description: "Average network TX bytes per second exceeds 100MB/s for 10 minutes. Validate downstream consumers and bandwidth."

  # Alert when the disk read throughput exceeds 100 MB/s for 10 minutes.
  - alert: DiskReadThroughputHigh
    # Calculate the average disk read bytes per second over 5 minutes and trigger if it exceeds 100 MB/s.
    expr: avg_over_time(runtime_disk_read_bytes_per_sec[5m]) > 1e8  # ~100 MB/s
    # Duration for which the condition must hold before alerting.
    for: 10m
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: platform
    # Annotations providing additional information about the alert.
    annotations:
      summary: "High disk read throughput"
      description: "Average disk read bytes per second exceeds 100MB/s for 10 minutes. Investigate IO-intensive workload."

  # Alert when the disk write throughput exceeds 100 MB/s for 10 minutes.
  - alert: DiskWriteThroughputHigh
    # Calculate the average disk write bytes per second over 5 minutes and trigger if it exceeds 100 MB/s.
    expr: avg_over_time(runtime_disk_write_bytes_per_sec[5m]) > 1e8  # ~100 MB/s
    # Duration for which the condition must hold before alerting.
    for: 10m
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: platform
    # Annotations providing additional information about the alert.
    annotations:
      summary: "High disk write throughput"
      description: "Average disk write bytes per second exceeds 100MB/s for 10 minutes. Investigate IO-intensive workload."

  # Alert when the disk read IOPS exceeds 5000 for 10 minutes.
  - alert: DiskReadIopsHigh
    # Calculate the average disk read IOPS over 5 minutes and trigger if it exceeds 5000.
    expr: avg_over_time(runtime_disk_read_iops[5m]) > 5000
    # Duration for which the condition must hold before alerting.
    for: 10m
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: platform
    # Annotations providing additional information about the alert.
    annotations:
      summary: "High disk read IOPS"
      description: "Average disk read IOPS exceeds 5000 for 10 minutes. Check storage performance and workload patterns."

  # Alert when the disk write IOPS exceeds 5000 for 10 minutes.
  - alert: DiskWriteIopsHigh
    # Calculate the average disk write IOPS over 5 minutes and trigger if it exceeds 5000.
    expr: avg_over_time(runtime_disk_write_iops[5m]) > 5000
    # Duration for which the condition must hold before alerting.
    for: 10m
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: platform
    # Annotations providing additional information about the alert.
    annotations:
      summary: "High disk write IOPS"
      description: "Average disk write IOPS exceeds 5000 for 10 minutes. Check storage performance and workload patterns."

  # SLO burn-rate style alerts
  # Alert when the error budget is burning fast (5m error rate exceeds 14.4x of 1% SLO).
  - alert: LLMErrorBudgetBurnFast
    # Calculate the error rate over 5 minutes and trigger if it exceeds 14.4x of 1% SLO.
    expr: (sum(rate(llm_errors_total[5m])) / clamp_min(sum(rate(llm_requests_total[5m])), 1)) > (0.01 * 14.4)
    # Duration for which the condition must hold before alerting.
    for: 5m
    # Labels for categorizing the alert.
    labels:
      severity: critical
      team: ml
    # Annotations providing additional information about the alert.
    annotations:
      summary: "Error budget burning fast (5m)"
      description: "5-minute error rate exceeds 14.4 times the 1% SLO objective. Immediate action recommended."

  # Alert when the error budget is burning slow (1h error rate exceeds 6x of 1% SLO).
  - alert: LLMErrorBudgetBurnSlow
    # Calculate the error rate over 1 hour and trigger if it exceeds 6x of 1% SLO.
    expr: (sum(rate(llm_errors_total[1h])) / clamp_min(sum(rate(llm_requests_total[1h])), 1)) > (0.01 * 6)
    # Duration for which the condition must hold before alerting.
    for: 2h
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: ml
    # Annotations providing additional information about the alert.
    annotations:
      summary: "Error budget burning slow (1h)"
      description: "1-hour error rate exceeds 6 times the 1% SLO objective. Investigate ongoing issues."

  # Alert when the p95 latency SLO is breached quickly (p95 latency > 1000ms for 10m).
  - alert: LLMLatencySLOBurnFast
    # Calculate the p95 latency over 5 minutes and trigger if it exceeds 1000ms.
    expr: histogram_quantile(0.95, sum by (le) (rate(llm_latency_ms_bucket[5m]))) > 1000
    # Duration for which the condition must hold before alerting.
    for: 10m
    # Labels for categorizing the alert.
    labels:
      severity: critical
      team: ml
    # Annotations providing additional information about the alert.
    annotations:
      summary: "p95 latency SLO breach (fast)"
      description: "p95 latency exceeds 1000ms over 10 minutes. Immediate attention required."

  # Alert when the p95 latency SLO is breached slowly (p95 latency > 1000ms for 2h).
  - alert: LLMLatencySLOBurnSlow
    # Calculate the p95 latency over 1 hour and trigger if it exceeds 1000ms.
    expr: histogram_quantile(0.95, sum by (le) (rate(llm_latency_ms_bucket[1h]))) > 1000
    # Duration for which the condition must hold before alerting.
    for: 2h
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: ml
    # Annotations providing additional information about the alert.
    annotations:
      summary: "p95 latency SLO breach (slow)"
      description: "p95 latency exceeds 1000ms over 1 hour. Persistent degradation detected."

  # Alert when the EWMA p95 latency drift exceeds 30% of the baseline for 10 minutes.
  - alert: LatencyDriftP95High
    # Check if the EWMA p95 latency drift exceeds 30%.
    expr: latency_drift_p95 > 0.3
    # Duration for which the condition must hold before alerting.
    for: 10m
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: ml
    # Annotations providing additional information about the alert.
    annotations:
      summary: "Latency drift p95 high"
      description: "EWMA p95 latency drift exceeds +30% of the baseline for 10 minutes. Investigate regressions or load spikes."

  # Alert when the EWMA p99 latency drift exceeds 30% of the baseline for 10 minutes.
  - alert: LatencyDriftP99High
    # Check if the EWMA p99 latency drift exceeds 30%.
    expr: latency_drift_p99 > 0.3
    # Duration for which the condition must hold before alerting.
    for: 10m
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: ml
    # Annotations providing additional information about the alert.
    annotations:
      summary: "Latency drift p99 high"
      description: "EWMA p99 latency drift exceeds +30% of the baseline for 10 minutes. Investigate tail-latency drivers."

  # Alert when the EWMA error rate exceeds 10% for 10 minutes.
  - alert: ErrorRateEWMAHigh
    # Check if the EWMA error rate exceeds 10%.
    expr: error_rate_ewma > 0.1
    # Duration for which the condition must hold before alerting.
    for: 10m
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: ml
    # Annotations providing additional information about the alert.
    annotations:
      summary: "Smoothed error rate high"
      description: "EWMA error rate exceeds 10% for 10 minutes. Sustained failures likely affecting users."

  # Alert when the EWMA error budget is burning fast (EWMA error rate exceeds 14.4x of 1% SLO).
  - alert: ErrorBudgetBurnEWMAFast
    # Check if the EWMA error rate exceeds 14.4x of 1% SLO.
    expr: error_rate_ewma > (0.01 * 14.4)
    # Duration for which the condition must hold before alerting.
    for: 5m
    # Labels for categorizing the alert.
    labels:
      severity: critical
      team: ml
    # Annotations providing additional information about the alert.
    annotations:
      summary: "Error budget burning fast (EWMA)"
      description: "EWMA error rate exceeds 14.4 times the 1% SLO over 5 minutes. Immediate mitigation recommended."

  # Alert when the EWMA error budget is burning slow (EWMA error rate exceeds 6x of 1% SLO).
  - alert: ErrorBudgetBurnEWMASlow
    # Check if the EWMA error rate exceeds 6x of 1% SLO.
    expr: error_rate_ewma > (0.01 * 6)
    # Duration for which the condition must hold before alerting.
    for: 2h
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: ml
    # Annotations providing additional information about the alert.
    annotations:
      summary: "Error budget burning slow (EWMA)"
      description: "EWMA error rate exceeds 6 times the 1% SLO over 2 hours. Persistent quality issues detected."

  # Exporter & Collector latency alerts
  # Alert when the exporter flush p95 duration exceeds 5 seconds for 10 minutes.
  - alert: ExporterSlowP95
    # Calculate the p95 exporter flush duration over 5 minutes and trigger if it exceeds 5 seconds.
    expr: histogram_quantile(0.95, sum by (le, exporter) (rate(exporter_duration_seconds_bucket[5m]))) > 5
    # Duration for which the condition must hold before alerting.
    for: 10m
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: platform
    # Annotations providing additional information about the alert.
    annotations:
      summary: "Exporter flush P95 slow"
      description: "Exporter flush p95 duration exceeds 5 seconds for 10 minutes. exporter={{ $labels.exporter }}"

  # Alert when the collector run p95 duration exceeds 1 second for 10 minutes.
  - alert: CollectorSlowP95
    # Calculate the p95 collector run duration over 5 minutes and trigger if it exceeds 1 second.
    expr: histogram_quantile(0.95, sum by (le, collector) (rate(collector_duration_seconds_bucket[5m]))) > 1
    # Duration for which the condition must hold before alerting.
    for: 10m
    # Labels for categorizing the alert.
    labels:
      severity: warning
      team: platform
    # Annotations providing additional information about the alert.
    annotations:
      summary: "Collector run P95 slow"
      description: "Collector p95 duration exceeds 1 second for 10 minutes. collector={{ $labels.collector }}"
