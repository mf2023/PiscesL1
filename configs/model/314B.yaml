version: "{{VERSION}}"
model_type: piscesl1_314b
vocab_size: 151646
hidden_size: 12288
n_layer: 160
n_head: 96
n_kv_head: 12

moe_num_experts: 16
moe_top_k: 4
moe_capacity_factor: 2.0
moe_load_balance_alpha: 0.03
moe_noise_std: 0.25
moe_use_stable_gate: true
moe_min_capacity: 4
moe_prediction_horizon: 16
moe_routing_temperature: 2.2
moe_temperature_min: 0.8
moe_temperature_max: 2.2
moe_random_to_gradient_steps: 1000

enable_dynamic_fusion: true
fusion_quality_threshold: 0.14
fusion_dropout: 0.02
enable_cognitive_density: true
enable_dynamic_capacity: true

intermediate_size: 49152
max_position_embeddings: 10485760
rope_theta: 10000.0
rope_scaling: null
dropout: 0.0

image_res: -1
image_patch: 14
max_image_res: 2048
use_native_resolution: true
enable_patch_pack: true
mm_tokens: 192
audio_tokens: 384
task_classes: 256
eval_dims: 7
residual_dropout_p: 0.1
use_gradient_checkpointing: true
use_pre_norm: true
attention_dropout: 0.0

training_config:
  learning_rate: 5.0e-6
  weight_decay: 0.01
  batch_size: 1
  sequence_length: 256
  gradient_accumulation_steps: 512
  max_steps: 100000
  warmup_ratio: 0.1
  min_lr_ratio: 0.1
  gradient_checkpointing: true
  mixed_precision: bf16
  flash_attention: true
  loss_type: lm
  response_only_loss: false
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2
  max_grad_norm: 1.0
  moe_gradient:
    enabled: true
  kfac:
    enabled: true
  multitask:
    enabled: false

inference_config:
  force_quant: null
  force_lora: true
  lora_config:
    r: 128
    lora_alpha: 256
    target_modules:
      - q_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
    lora_dropout: 0.05
    bias: none
  sampling:
    temperature: 0.7
    top_p: 0.95
    max_length: 512
    top_k_short: 40
    top_p_short: 0.9
    top_k_long: 20
    top_p_long: 0.8
  vllm:
    use_vllm: false
    dtype: auto
    gpu_memory_utilization: 0.9
    tensor_parallel_size: 1
  speculative:
    enable: false
    gamma: 4
    draft_model: null
  chunk_size: 512

use_h2o_attention: true
streaming_window: 32768
compression_ratio: 8
max_cache_size: 65536
cache_quantization: true
kv_cache_block_size: 1024
sdpa_prefer_flash: true

enable_speculative_decoding: true
speculative_candidates: 4
speculative_draft_length: 5
speculative_acceptance_threshold: 0.8
speculative_temperature: 0.7
speculative_top_k: 50
speculative_top_p: 0.9

galore_enabled: true
galore_rank: 768
galore_update_interval: 200
galore_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
  - moe_gate
galore_lr_ratio: 1.0
galore_min_rank: 192
galore_max_rank: 1536
galore_rank_adapt_interval: 1000
galore_rank_adapt_threshold: 0.1
galore_quantization_bits: 8
galore_memory_efficient: true
galore_moe_expert_only: false
galore_multimodal_modules:
  - vision_encoder
  - audio_encoder
  - multimodal_fusion
galore_sequence_threshold: 16384
galore_gradient_accumulation_sync: true

chinchilla_optimal: false
chinchilla_c_budget: 0
chinchilla_d_ratio: 1.0

use_mla: true
kv_lora_rank: 2048
mla_q_lora_rank: null
mla_rope_scaling_factor: 1.0

num_mtp_heads: 4
mtp_loss_weight: 0.5
mtp_share_embeddings: true

image_gen_resolution: 768
image_gen_num_steps: 50
image_gen_guidance_scale: 7.5
image_gen_initial_size: 8
image_gen_use_attention: true
image_gen_use_residual: true
image_gen_use_diffusion: true

audio_gen_sample_rate: 44100
audio_gen_n_mels: 128
audio_gen_duration: 20.0
audio_gen_num_steps: 100
audio_gen_streaming: true
audio_gen_num_codebooks: 4
audio_gen_codebook_size: 8192

video_gen_fps: 60
video_gen_num_frames: 90
video_gen_resolution: 768

generation_max_tokens: 4096
generation_temperature: 1.0
generation_top_p: 0.95
generation_top_k: 50
