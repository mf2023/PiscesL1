version: "{{VERSION}}"
model_type: piscesl1_0.5b
vocab_size: 151646
hidden_size: 640
n_layer: 16
n_head: 10
n_kv_head: 5

moe_num_experts: 6
moe_top_k: 2
moe_capacity_factor: 1.2
moe_load_balance_alpha: 0.05
moe_noise_std: 0.35
moe_use_stable_gate: true
moe_min_capacity: 4
moe_prediction_horizon: 8
moe_routing_temperature: 3.0
moe_temperature_min: 0.8
moe_temperature_max: 3.0
moe_random_to_gradient_steps: 2000

enable_dynamic_fusion: true
fusion_quality_threshold: 0.28
fusion_dropout: 0.08
enable_cognitive_density: true
enable_dynamic_capacity: true

intermediate_size: 1280
max_position_embeddings: 262144
rope_theta: 10000.0
rope_scaling: null
dropout: 0.0

image_res: -1
image_patch: 14
max_image_res: 512
use_native_resolution: false
enable_patch_pack: false
mm_tokens: 16
audio_tokens: 32
task_classes: 256
eval_dims: 7
residual_dropout_p: 0.1
use_gradient_checkpointing: false
use_pre_norm: true
attention_dropout: 0.0

training_config:
  learning_rate: 3.0e-5
  weight_decay: 0.01
  batch_size: 2
  sequence_length: 128
  gradient_accumulation_steps: 4
  max_steps: 100000
  warmup_ratio: 0.1
  min_lr_ratio: 0.1
  gradient_checkpointing: true
  mixed_precision: bf16
  flash_attention: true
  loss_type: lm
  response_only_loss: false
  num_workers: 2
  pin_memory: true
  prefetch_factor: 2
  max_grad_norm: 1.0
  moe_gradient:
    enabled: true
  kfac:
    enabled: false
  multitask:
    enabled: false

inference_config:
  force_quant: null
  force_lora: false
  lora_config:
    r: 8
    lora_alpha: 32
    target_modules:
      - q_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
    lora_dropout: 0.05
    bias: none
  sampling:
    temperature: 0.7
    top_p: 0.95
    max_length: 512
    top_k_short: 40
    top_p_short: 0.9
    top_k_long: 20
    top_p_long: 0.8
  vllm:
    use_vllm: false
    dtype: auto
    gpu_memory_utilization: 0.9
    tensor_parallel_size: 1
  speculative:
    enable: false
    gamma: 4
    draft_model: null
  chunk_size: 512

use_h2o_attention: true
streaming_window: 4096
compression_ratio: 8
max_cache_size: 4096
cache_quantization: true
kv_cache_block_size: 256
sdpa_prefer_flash: true

enable_speculative_decoding: true
speculative_candidates: 4
speculative_draft_length: 4
speculative_acceptance_threshold: 0.8
speculative_temperature: 0.7
speculative_top_k: 50
speculative_top_p: 0.9

galore_enabled: true
galore_rank: 48
galore_update_interval: 200
galore_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
galore_lr_ratio: 1.0
galore_min_rank: 12
galore_max_rank: 96
galore_rank_adapt_interval: 1000
galore_rank_adapt_threshold: 0.1
galore_quantization_bits: 8
galore_memory_efficient: true
galore_moe_expert_only: false
galore_multimodal_modules:
  - vision_encoder
  - audio_encoder
  - multimodal_fusion
galore_sequence_threshold: 1024
galore_gradient_accumulation_sync: true

chinchilla_optimal: false
chinchilla_c_budget: 0
chinchilla_d_ratio: 1.0

use_mla: true
kv_lora_rank: 256
mla_q_lora_rank: null
mla_rope_scaling_factor: 1.0

num_mtp_heads: 4
mtp_loss_weight: 0.5
mtp_share_embeddings: true

image_gen_resolution: 128
image_gen_num_steps: 30
image_gen_guidance_scale: 5.0
image_gen_initial_size: 8
image_gen_use_attention: false
image_gen_use_residual: true
image_gen_use_diffusion: false

audio_gen_sample_rate: 16000
audio_gen_n_mels: 80
audio_gen_duration: 3.0
audio_gen_num_steps: 50
audio_gen_streaming: true
audio_gen_num_codebooks: 2
audio_gen_codebook_size: 2048

video_gen_fps: 16
video_gen_num_frames: 8
video_gen_resolution: 128

generation_max_tokens: 512
generation_temperature: 1.0
generation_top_p: 0.95
generation_top_k: 50
