version: "{{VERSION}}"

defaults:
  max_samples_per_dataset: -1
  post_download_clean: true
  source_preference:
    - "modelscope"
    - "huggingface"

datasets:
  # ============================================================
  # Text Pre-training Corpora
  # ============================================================
  - name: "EleutherAI/the_pile_deduplicated"
    save: "Pile"
    desc: "The Pile deduplicated - 825GB high-quality text"
    source: "huggingface"
  - name: "AI-ModelScope/wikipedia_en"
    save: "WikiEN"
    desc: "English Wikipedia"
    source: "modelscope"
  - name: "bookcorpus/bookcorpus"
    save: "BookCorpus"
    desc: "BookCorpus - books text (if available in parquet format)"
    source: "huggingface"

  # ============================================================
  # Chinese Corpora
  # ============================================================
  - name: "baicai003/Llama3-Chinese-dataset"
    save: "Chinese1"
    desc: "Chinese instruction dataset"
    source: "modelscope"
  - name: "liucong/Chinese-DeepSeek-R1-Distill-data-110k-SFT"
    save: "Chinese2"
    desc: "Chinese DeepSeek R1 distill data"
    source: "modelscope"
  - name: "AI-ModelScope/OpenOrca-Chinese"
    save: "Chinese3"
    desc: "Chinese OpenOrca"
    source: "modelscope"
  - name: "swift/Chinese-Qwen3-235B-2507-Distill-data-110k-SFT"
    save: "Chinese4"
    desc: "Chinese Qwen3 distill data"
    source: "modelscope"
  - name: "xiaofengalg/Chinese-medical-dialogue"
    save: "Chinese5"
    desc: "Chinese medical dialogue"
    source: "modelscope"
  - name: "opencsg/chinese-cosmopedia"
    save: "Chinese6"
    desc: "Chinese cosmopedia"
    source: "modelscope"

  # ============================================================
  # Code Datasets
  # ============================================================
  - name: "bigcode/the-stack-v2"
    save: "TheStackV2"
    desc: "The Stack V2 - 823B tokens, 600+ languages"
    source: "huggingface"
  - name: "bigcode/starcoderdata"
    save: "StarCoderData"
    desc: "StarCoder training data - 80+ languages"
    source: "huggingface"
  - name: "AI-ModelScope/CodeAlpaca_20K"
    save: "Code1"
    desc: "Code Alpaca 20K"
    source: "modelscope"
  - name: "AI-ModelScope/codeparrot_github-code-chemistry-python"
    save: "Code2"
    desc: "GitHub Python code"
    source: "modelscope"
  - name: "AI-ModelScope/CodeExercise-Python-27k"
    save: "Code3"
    desc: "Python code exercises"
    source: "modelscope"
  - name: "ise-uiuc/Magicoder-OSS-Instruct-75K"
    save: "Magicoder"
    desc: "Magicoder - high-quality code instruction"
    source: "huggingface"

  # ============================================================
  # Math & Reasoning
  # ============================================================
  - name: "AI-ModelScope/MetaMathQA"
    save: "Math1"
    desc: "MetaMathQA - 395K math reasoning"
    source: "modelscope"
  - name: "AI-ModelScope/NuminaMath-CoT"
    save: "Math2"
    desc: "NuminaMath CoT - 860K math chain-of-thought"
    source: "modelscope"
  - name: "AI-ModelScope/competition_math"
    save: "Math3"
    desc: "Competition math problems"
    source: "modelscope"
  - name: "gsm8k"
    save: "GSM8K"
    desc: "GSM8K - grade school math"
    source: "huggingface"
  - name: "lighteval/MATH"
    save: "MATH"
    desc: "MATH benchmark - competition level"
    source: "huggingface"
  - name: "AI-ModelScope/CoT"
    save: "CoT"
    desc: "Chain-of-Thought reasoning"
    source: "modelscope"

  # ============================================================
  # Image-Text Datasets
  # ============================================================
  - name: "AI-ModelScope/LAION-SG"
    save: "LAION_SG"
    desc: "LAION subset"
    source: "modelscope"
  - name: "laion/laion2B-en"
    save: "LAION2B"
    desc: "LAION-2B English - 2B image-text pairs"
    source: "huggingface"
  - name: "laion/laion400M"
    save: "LAION400M"
    desc: "LAION-400M - CLIP filtered"
    source: "huggingface"
  - name: "kakaobrain/coyo-700m"
    save: "COYO700M"
    desc: "COYO-700M - high-quality image-text"
    source: "huggingface"
  - name: "AI-ModelScope/coco_captions_small_slice"
