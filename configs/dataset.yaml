  - name: "mozilla-foundation/common_voice_17_0"
    save: "CommonVoice"
    desc: "Common Voice - 200K+ hours multilingual"
    source: "huggingface"
  - name: "facebook/voxlingua107"
    save: "VoxLingua"
    desc: "VoxLingua107 - 107 languages"
    source: "huggingface"

  # ============================================================
  # Video Datasets
  # ============================================================
  - name: "AI-ModelScope/webvid-10M"
