watermark_system:
  version: "{{VERSION}}"
  force_enabled: true
  
  jurisdiction:
    default: "CN"
    supported:
      - "CN"
      - "EU"
      - "US"
      - "UK"
      - "JP"
      - "KR"
      - "GLOBAL"
    standards:
      CN: "GB/T 45225-2024"
      EU: "AI Act 2024"
      US: "NIST AI RMF 1.0"
      UK: "AI Safety Act 2024"
      JP: "AI Guidelines 2024"
      KR: "AI Act 2024"
      GLOBAL: "ISO/IEC 27090"
    requirements:
      CN:
        mandatory_disclosure: true
        retention_days: 365
        risk_level: "medium"
        watermark_strength: 1.0e-05
        redundancy_level: 3
        audit_enabled: true
      EU:
        mandatory_disclosure: true
        retention_days: 2555
        risk_level: "high"
        watermark_strength: 5.0e-06
        redundancy_level: 3
        audit_enabled: true
      US:
        mandatory_disclosure: false
        retention_days: 365
        risk_level: "medium"
        watermark_strength: 1.0e-05
        redundancy_level: 2
        audit_enabled: true
      UK:
        mandatory_disclosure: true
        retention_days: 730
        risk_level: "high"
        watermark_strength: 5.0e-06
        redundancy_level: 4
        audit_enabled: true
      JP:
        mandatory_disclosure: false
        retention_days: 365
        risk_level: "low"
        watermark_strength: 1.0e-05
        redundancy_level: 2
        audit_enabled: false
      KR:
        mandatory_disclosure: true
        retention_days: 365
        risk_level: "medium"
        watermark_strength: 1.0e-05
        redundancy_level: 3
        audit_enabled: true
      GLOBAL:
        mandatory_disclosure: false
        retention_days: 365
        risk_level: "medium"
        watermark_strength: 1.0e-05
        redundancy_level: 3
        audit_enabled: true

  protocol:
    sync_header: "0xA5F0A5F0"
    sync_bits: 32
    length_bits: 16
    crc_bits: 32
    parity_bits: 1
    max_payload_size: 4096
    encoding: "base64"
    ecc:
      type: "repeat3"
      symbol_bits: 2

  text:
    enabled: true
    zero_width:
      characters:
        - "\u200B"
        - "\u200C"
        - "\u200D"
        - "\uFEFF"
        - "\u2060"
        - "\u2061"
        - "\u2062"
        - "\u2063"
      encoding_bits: 2
      force_density: 0.33
      redundancy: 3
      tamper_proof: true
      distribution: "pseudo_random"
    visible_prefix: null
    payload_layers:
      - "model_id"
      - "version"
      - "timestamp"
      - "session_id"
      - "user_hash"
      - "content_hash"
      - "trace_chain"
      - "compliance"

  image:
    enabled: true
    hidden:
      method: "dct"
      block_size: 8
      embed_band: "mid"
      channels:
        - "Y"
        - "U"
        - "V"
      dct_strength: 0.08
      pairwise_encoding: true
      resistance:
        - "jpeg"
        - "crop"
        - "noise"
        - "filter"
      key: "pisces2025_dct"
      ecc: "repeat3"
    visible:
      enabled: true
      text: "AI-Generated"
      position: "bottom_right"
      opacity: 0.8
      font_size: 24
      color: "rgba(255,255,255,0.9)"

  video:
    enabled: true
    frame_interval: 5
    keyframe_boost: 2.0
    audio_sync: true
    hidden:
      method: "dct"
      inherit_from_image: true
    visible_overlay:
      enabled: true
      text: "AI-Generated"
      position: "bottom_right"
      duration: "full"
      opacity: 0.7

  audio:
    enabled: true
    hidden:
      method: "stft"
      sample_rate: 44100
      frequency_range:
        - 18000
        - 20000
      amplitude: 0.01
      spread_spectrum: true
      spread_factor: 10
      lsb_bits: 6
      key: "pisces2025_audio"
      frame_sync: true
    visible: null

  weight:
    enabled: true
    method: "regularization"
    owner_id: "dunimd"
    model_id: "PiscesL1"
    seed: 2025
    strength: 1.0e-05
    verify_threshold: 0.02
    layer_selection:
      types:
        - "Linear"
        - "Conv2d"
        - "Embedding"
      top_n: 10
      min_size: 1024
    codebook:
      generation: "cryptographic"
      values:
        - -1
        - 1
      normalization: "l2"
    distributed_sync: true

  payload:
    mandatory_fields:
      - "model_id"
      - "version"
      - "timestamp"
      - "session_id"
      - "user_hash"
      - "content_hash"
      - "trace_chain"
    optional_fields:
      - "owner_id"
      - "device_id"
      - "ip_hash"
      - "request_id"
    compliance_fields:
      - "standard"
      - "jurisdiction"
      - "risk_level"
      - "mandatory_disclosure"

  encryption:
    enabled: true
    algorithm: "AES-256-GCM"
    key_derivation: "PBKDF2"
    iterations: 100000

  detection:
    threshold: 0.02
    confidence_level: 0.95
    batch_size: 1000
    method: "local"
    response_time_ms: 100

  audit:
    enabled: true
    operations:
      - "embed"
      - "extract"
      - "verify"
    hash_chain: true
    lock_after_generation: true
    storage:
      type: "file"
      path: "./audit_logs/watermark"
      rotation_days: 30
    report_format: "json"

  traceability:
    chain_enabled: true
    forward_tracking: true
    modification_detection: true
    regulatory_reporting: true
    forensic_analysis: true

  performance:
    embed_timeout_ms: 500
    extract_timeout_ms: 200
    verify_timeout_ms: 100
    max_concurrent_operations: 100
