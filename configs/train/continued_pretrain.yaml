version: "{{VERSION}}"
stage: continued_pretrain

optimizer:
  name: adamw
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas:
    - 0.9
    - 0.999
  eps: 1.0e-8
  use_galore: true
  galore_rank: 96
  galore_update_proj_gap: 200

scheduler:
  name: cosine
  warmup_ratio: 0.02
  min_lr_ratio: 0.1
  decay_steps: null

data:
  batch_size: 256
  sequence_length: 4096
  num_workers: 8
  pin_memory: true
  prefetch_factor: 4
  datasets: []

training:
  max_steps: 50000
  save_steps: 1000
  eval_steps: 500
  log_steps: 10
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  mixed_precision: bf16
  flash_attention: true
  packing: false

loss:
  loss_type: lm
  response_only_loss: false

advanced_operators:
  moe_gradient:
    enabled: true
  kfac:
    enabled: false
  multitask:
    enabled: false
  watermark:
    enabled: false
  modality_scheduler:
    enabled: true

distributed:
  enabled: false
  world_size: 1
  parallel_3d:
    enabled: false
    dp_size: 1
    tp_size: 1
    pp_size: 1
    sequence_parallel: true
    num_micro_batches: 4
    overlap_communication: true
    gradient_checkpointing: false
    zero_stage: 0
