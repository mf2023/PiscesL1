version: "{{VERSION}}"
stage: pretrain

optimizer:
  name: adamw
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas:
    - 0.9
    - 0.999
  eps: 1.0e-8
  use_galore: false
  galore_rank: 128
  galore_update_proj_gap: 200

scheduler:
  name: cosine
  warmup_ratio: 0.1
  min_lr_ratio: 0.0
  decay_steps: null

data:
  batch_size: 32
  sequence_length: 2048
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2
  datasets: []

training:
  max_steps: 100000
  save_steps: 1000
  eval_steps: 500
  log_steps: 10
  gradient_accumulation_steps: 1
  gradient_checkpointing: true
  mixed_precision: bf16
  flash_attention: true
  packing: false

moe:
  routing_temperature: 1.30
  temperature_min: 0.80
  temperature_max: 3.00
  expert_temperature_max: 5.00
  expert_load_balance_threshold: 0.15

loss:
  loss_type: lm
  response_only_loss: false

advanced_operators:
  moe_gradient:
    enabled: true
  kfac:
    enabled: false
  multitask:
    enabled: false
  watermark:
    enabled: false
  modality_scheduler:
    enabled: false

distributed:
  enabled: false
  world_size: 1
  parallel_3d:
    enabled: false
    dp_size: 1
    tp_size: 1
    pp_size: 1
    sequence_parallel: true
    num_micro_batches: 4
    overlap_communication: true
    gradient_checkpointing: false
    zero_stage: 0

quantization:
  enable_quantization: false
  quant_method: nf4
  bits: 4
  group_size: 128
  symmetric: false
  enable_fp8_linear: false

lora:
  enabled: false
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules: null
  bias: none
  task_type: CAUSAL_LM
