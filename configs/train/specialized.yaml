version: "{{VERSION}}"
stage: specialized

optimizer:
  name: adamw
  learning_rate: 1.0e-5
  weight_decay: 0.01
  betas:
    - 0.9
    - 0.999
  eps: 1.0e-8
  use_galore: true
  galore_rank: 48
  galore_update_proj_gap: 200

scheduler:
  name: cosine
  warmup_ratio: 0.05
  min_lr_ratio: 0.1
  decay_steps: null

data:
  batch_size: 64
  sequence_length: 2048
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2
  datasets: []

training:
  max_steps: 10000
  save_steps: 500
  eval_steps: 200
  log_steps: 10
  gradient_accumulation_steps: 2
  gradient_checkpointing: true
  mixed_precision: bf16
  flash_attention: true
  packing: false

loss:
  loss_type: lm
  response_only_loss: true

advanced_operators:
  moe_gradient:
    enabled: true
  kfac:
    enabled: true
  multitask:
    enabled: true
  watermark:
    enabled: false
  modality_scheduler:
    enabled: false

distributed:
  enabled: false
  world_size: 1
  parallel_3d:
    enabled: false
    dp_size: 1
    tp_size: 1
    pp_size: 1
    sequence_parallel: true
    num_micro_batches: 4
    overlap_communication: true
    gradient_checkpointing: false
    zero_stage: 0

lora:
  enabled: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none
  task_type: CAUSAL_LM
