version: "{{VERSION}}"
stage: alignment_ppo

optimizer:
  name: adamw
  learning_rate: 1.0e-6
  weight_decay: 0.0
  betas:
    - 0.9
    - 0.999
  eps: 1.0e-8
  use_galore: false
  galore_rank: 32
  galore_update_proj_gap: 200

scheduler:
  name: cosine
  warmup_ratio: 0.1
  min_lr_ratio: 0.1
  decay_steps: null

data:
  batch_size: 16
  sequence_length: 512
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2
  datasets: []

training:
  max_steps: 5000
  save_steps: 500
  eval_steps: 200
  log_steps: 10
  gradient_accumulation_steps: 1
  gradient_checkpointing: false
  mixed_precision: bf16
  flash_attention: true
  packing: false

loss:
  loss_type: ppo
  response_only_loss: false
  ppo_epochs: 4
  clip_range: 0.2
  kl_coef: 0.1

advanced_operators:
  moe_gradient:
    enabled: false
  kfac:
    enabled: false
  multitask:
    enabled: false
  watermark:
    enabled: false
  modality_scheduler:
    enabled: false

distributed:
  enabled: false
  world_size: 1
  parallel_3d:
    enabled: false
    dp_size: 1
    tp_size: 1
    pp_size: 1
    sequence_parallel: true
    num_micro_batches: 4
    overlap_communication: true
    gradient_checkpointing: false
    zero_stage: 0
